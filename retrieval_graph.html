": "to", "from": "INSURED", "title": "\n        The insured individual holds an insurance policy for the insured vehicle, creating a financial contract between them\n        Weight: 1.0\n        ", "to": "INSURED VEHICLE"}, {"arrows": "to", "from": "INSURANCE REGULATORY AND DEVELOPMENT AUTHORITY OF INDIA", "title": "\n        IRDAI operates the Bima Bharosa Portal as a mechanism for consumers to address grievances related to insurance matters.\n        Weight: 9.0\n        ", "to": "BIMA BHAROSA PORTAL"}, {"arrows": "to", "from": "COMPANY", "title": "\n        The company mandates a valid Fitness Certificate for the policy to remain effective\n        Weight: 1.0\n        ", "to": "FITNESS CERTIFICATE"}, {"arrows": "to", "from": "IL SMART ASSIST ADD-ON", "title": "\n        The IL Smart Assist Add-On is a service provided by the company as part of their insurance offerings\n        Weight: 8.0\n        ", "to": "COMPANY"}, {"arrows": "to", "from": "POLICY", "title": "\n        The policy is a product of the company, outlining the specifics of coverage and liabilities\n        Weight: 8.0\n        ", "to": "COMPANY"}, {"arrows": "to", "from": "COMPANY", "title": "\n        The company requires a valid PUC Certificate as a condition for maintaining the insurance policy\n        Weight: 7.0\n        ", "to": "POLLUTION UNDER CONTROL (PUC) CERTIFICATE"}, {"arrows": "to", "from": "ICICI LOMBARD", "title": "\n        ICICI Lombard is an insurance provider that offers a range of services to its clients. In instances where customers face unresolved grievances or issues with their insurance policies, they have the option to escalate these problems to the Insurance Ombudsman. The role of the Insurance Ombudsman is to serve as an independent authority that helps resolve complaints in a fair and effective manner.\n\nCustomers of ICICI Lombard are encouraged to utilize the Insurance Ombudsman as a recourse for grievance resolution. This process ensures that any disputes or dissa
